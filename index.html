<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WildShorts | Ethereal Jungle</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        :root {
            --bg: #0f1211;
            --surface: #161b19;
            --surface-muted: #1c2220;
            --accent: #4dd0bb;
            --accent-soft: rgba(77, 208, 187, 0.12);
            --text-primary: #f3f6f5;
            --text-secondary: #9fa9a4;
            --border: #2b3330;
            --font-main: 'Space Grotesk', sans-serif;
            --ease: cubic-bezier(0.2, 0.7, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        body {
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--text-primary);
            font-family: var(--font-main);
            background:
                radial-gradient(circle at 90% -10%, rgba(77, 208, 187, 0.11) 0%, transparent 45%),
                radial-gradient(circle at -10% 10%, rgba(197, 224, 183, 0.08) 0%, transparent 35%),
                var(--bg);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #3a4440;
            border-radius: 12px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #4b5651;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 76px;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            background: rgba(15, 18, 17, 0.84);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border);
        }

        .brand {
            cursor: pointer;
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #eff4f2;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .user-panel {
            gap: 0.6rem;
            display: flex;
            cursor: pointer;
            font-size: 0.82rem;
            border-radius: 999px;
            align-items: center;
            padding: 0.5rem 0.9rem;
            color: var(--text-primary);
            background: var(--surface);
            border: 1px solid var(--border);
            transition: border-color 0.25s var(--ease), background 0.25s var(--ease);
        }

        .user-panel:hover {
            border-color: #98a69d;
            background: var(--surface-muted);
        }

        .balance {
            gap: 0.45rem;
            display: flex;
            align-items: center;
            font-weight: 700;
            color: #95ddcf;
        }

        .dock {
            left: 50%;
            bottom: 1.4rem;
            z-index: 1000;
            display: flex;
            gap: 0.45rem;
            position: fixed;
            border-radius: 16px;
            padding: 0.4rem 0.45rem;
            transform: translateX(-50%);
            background: rgba(19, 24, 22, 0.92);
            border: 1px solid var(--border);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.28);
        }

        .dock-btn {
            width: 42px;
            height: 42px;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            border-radius: 12px;
            background: transparent;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.22s var(--ease);
        }

        .dock-btn:hover,
        .dock-btn.active {
            color: var(--accent);
            background: var(--accent-soft);
        }

        .dock-btn span {
            position: absolute;
            left: 50%;
            bottom: 118%;
            opacity: 0;
            font-size: 0.7rem;
            font-weight: 600;
            white-space: nowrap;
            pointer-events: none;
            border-radius: 8px;
            padding: 0.3rem 0.55rem;
            color: var(--text-primary);
            background: var(--surface);
            border: 1px solid var(--border);
            transform: translateX(-50%) translateY(4px);
            transition: all 0.22s var(--ease);
        }

        .dock-btn:hover span {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        main {
            margin: 0 auto;
            max-width: 1180px;
            padding: 104px 1.25rem 120px;
        }

        .hero {
            margin-bottom: 3rem;
        }

        .hero-card {
            display: grid;
            gap: 1.5rem;
            min-height: 360px;
            border-radius: 26px;
            overflow: hidden;
            position: relative;
            align-items: center;
            grid-template-columns: 1fr 0.95fr;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 1.8rem;
        }

        .hero-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 18px;
            min-height: 280px;
            opacity: 0.92;
        }

        .hero-content {
            max-width: 560px;
        }

        .hero-tag {
            display: inline-flex;
            margin-bottom: 0.9rem;
            border-radius: 999px;
            padding: 0.28rem 0.64rem;
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--accent);
            background: var(--accent-soft);
        }

        .hero-title {
            font-size: clamp(1.9rem, 4.5vw, 3rem);
            line-height: 1.03;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 0.85rem;
        }

        .hero-desc {
            max-width: 62ch;
            line-height: 1.55;
            font-size: 0.98rem;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            display: -webkit-box;
            overflow: hidden;
        }

        .hero-notice {
            display: grid;
            gap: 0.55rem;
            margin: 0 0 1.25rem;
            padding: 0.8rem 0.9rem;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: linear-gradient(140deg, rgba(149, 221, 207, 0.09), rgba(149, 221, 207, 0.03));
        }

        .hero-notice .line {
            display: flex;
            gap: 0.6rem;
            align-items: center;
            color: var(--text-primary);
            font-size: 0.8rem;
            line-height: 1.3;
        }

        .hero-notice .pill {
            border-radius: 999px;
            padding: 0.15rem 0.5rem;
            border: 1px solid rgba(149, 221, 207, 0.45);
            background: rgba(149, 221, 207, 0.12);
            color: #b9fff1;
            font-size: 0.64rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 1.3rem;
            letter-spacing: -0.02em;
            color: var(--text-primary);
        }

        .grid {
            display: grid;
            gap: 1rem;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        }

        .card {
            cursor: pointer;
            border-radius: 18px;
            overflow: hidden;
            padding: 0.8rem;
            background: var(--surface);
            border: 1px solid var(--border);
            transition: transform 0.24s var(--ease), border-color 0.24s var(--ease), box-shadow 0.24s var(--ease);
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: #b8c4bb;
            box-shadow: 0 10px 24px rgba(17, 22, 20, 0.08);
        }

        .card-cover {
            width: 100%;
            aspect-ratio: 3 / 4;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 0.8rem;
        }

        .card-title {
            font-size: 1.03rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            margin-bottom: 0.3rem;
        }

        .card-desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.45;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .btn {
            border: none;
            cursor: pointer;
            font-weight: 700;
            border-radius: 12px;
            padding: 0.68rem 1.1rem;
            font-family: var(--font-main);
            font-size: 0.76rem;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            transition: transform 0.2s var(--ease), opacity 0.2s var(--ease), background 0.2s var(--ease);
        }

        .btn-primary {
            color: #ffffff;
            background: #162620;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            background: #214236;
        }

        .ws-auth-shell {
            text-align: center;
            padding: 0.8rem 0.4rem 0.3rem;
        }

        .ws-auth-lock {
            width: 86px;
            height: 86px;
            margin: 0 auto 1.15rem;
            border-radius: 24px;
            border: 1px solid rgba(149, 221, 207, 0.35);
            background: radial-gradient(circle at 32% 28%, rgba(185, 255, 241, 0.24), rgba(18, 31, 27, 0.94));
            display: flex;
            align-items: center;
            justify-content: center;
            color: #b9fff1;
            box-shadow: inset 0 0 24px rgba(149, 221, 207, 0.12), 0 12px 26px rgba(4, 8, 7, 0.35);
        }

        .ws-auth-lock i {
            font-size: 2.15rem;
        }

        .ws-auth-title {
            font-size: clamp(1.75rem, 3vw, 2.5rem);
            font-weight: 900;
            margin: 0 0 0.55rem;
            color: #f2fffa;
            letter-spacing: -0.02em;
        }

        .ws-auth-subtitle {
            color: #8ea7a1;
            margin: 0 auto 1.5rem;
            max-width: 620px;
            line-height: 1.5;
            font-size: 0.94rem;
        }

        .ws-auth-form {
            width: min(100%, 540px);
            margin: 0 auto;
            display: grid;
            gap: 0.92rem;
            padding: 1.15rem;
            border-radius: 20px;
            border: 1px solid rgba(149, 221, 207, 0.24);
            background: linear-gradient(155deg, rgba(14, 23, 20, 0.95), rgba(16, 26, 22, 0.88));
            box-shadow: inset 0 0 18px rgba(149, 221, 207, 0.08);
        }

        .ws-input-group {
            display: grid;
            gap: 0.4rem;
            text-align: left;
        }

        .ws-input-group label {
            color: #d2e8e2;
            font-size: 0.82rem;
            font-weight: 800;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .ws-input {
            width: 100%;
            border-radius: 12px;
            border: 1px solid rgba(149, 221, 207, 0.28);
            background: rgba(8, 14, 12, 0.92);
            color: #f4fffb;
            padding: 0.8rem 0.95rem;
            font-size: 0.95rem;
            outline: none;
            transition: border-color .2s var(--ease), box-shadow .2s var(--ease), transform .2s var(--ease);
        }

        .ws-input::placeholder {
            color: #7c938d;
        }

        .ws-input:focus {
            border-color: #95ddcf;
            box-shadow: 0 0 0 3px rgba(149, 221, 207, 0.14);
            transform: translateY(-1px);
        }

        .ws-btn-primary {
            border: 1px solid rgba(149, 221, 207, 0.45);
            border-radius: 14px;
            padding: 0.86rem 1.05rem;
            font-weight: 900;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: #04100c;
            background: linear-gradient(90deg, #95ddcf, #7bd9c7);
            cursor: pointer;
            transition: transform .2s var(--ease), box-shadow .2s var(--ease), filter .2s var(--ease);
        }

        .ws-btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 24px rgba(149, 221, 207, 0.25);
            filter: brightness(1.03);
        }

        .ws-btn-primary:disabled {
            opacity: .72;
            cursor: wait;
            transform: none;
            box-shadow: none;
        }

        .ws-login-error {
            color: #ff6b6b;
            margin-top: 1rem;
            font-weight: 800;
            display: none;
            font-size: 0.88rem;
        }

        .modal {
            position: fixed;
            inset: 0;
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(16, 19, 18, 0.42);
            backdrop-filter: blur(4px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.28s var(--ease);
        }

        .modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            width: min(860px, 92vw);
            max-height: 84vh;
            overflow-y: auto;
            position: relative;
            border-radius: 22px;
            padding: 1.35rem;
            background: var(--surface);
            border: 1px solid var(--border);
            transform: translateY(8px);
            transition: transform 0.28s var(--ease);
        }

        .modal.active .modal-content {
            transform: translateY(0);
        }

        .close-btn {
            top: 1rem;
            right: 1rem;
            width: 46px;
            height: 46px;
            border: none;
            display: flex;
            cursor: pointer;
            position: absolute;
            border-radius: 50%;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            background: var(--surface-muted);
            z-index: 8;
            padding: 0;
            touch-action: manipulation;
        }

        .close-btn i {
            pointer-events: none;
        }

        .btn.is-loading {
            opacity: 0.86;
            cursor: wait;
            pointer-events: none;
        }

        .story-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .story-content {
            font-size: 1.02rem;
            line-height: 1.8;
            color: var(--text-secondary);
        }

        .ws-flashback {
            margin: 1rem 0 1.2rem;
            border-radius: 14px;
            border: 1px solid #3a4450;
            background: rgba(92, 102, 119, 0.14);
            overflow: hidden;
        }

        .ws-flashback summary {
            list-style: none;
            cursor: pointer;
            user-select: none;
            font-size: 0.82rem;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: #cfd7e4;
            background: rgba(75, 87, 106, 0.22);
            padding: 0.7rem 0.9rem;
            border-bottom: 1px solid rgba(159, 170, 189, 0.24);
        }

        .ws-flashback summary::-webkit-details-marker {
            display: none;
        }

        .ws-flashback-body {
            color: #d8deea;
            background: rgba(61, 70, 86, 0.2);
            padding: 0.9rem 1rem 1rem;
            border-top: 1px solid rgba(159, 170, 189, 0.16);
            line-height: 1.75;
            white-space: normal;
        }

        .story-title {
            color: var(--text-primary);
            font-size: 2rem;
            margin-bottom: 1.3rem;
            letter-spacing: -0.03em;
        }

        .episode-row:hover {
            transform: translateX(4px);
        }

        .reward-hub {
            border: 1px solid var(--border);
            background: linear-gradient(130deg, rgba(77, 208, 187, 0.08), rgba(18, 24, 22, 0.9));
            border-radius: 18px;
            padding: 1rem;
            margin: 0 0 1.4rem;
        }

        .reward-hub-grid {
            display: grid;
            gap: 0.9rem;
            grid-template-columns: 1fr 1.2fr;
        }

        .reward-cell {
            border: 1px solid var(--border);
            background: rgba(14, 18, 17, 0.62);
            border-radius: 14px;
            padding: 0.8rem;
        }

        .streak-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0.35rem;
            margin-top: 0.55rem;
        }

        .streak-day {
            border-radius: 10px;
            border: 1px solid var(--border);
            background: #121917;
            min-height: 52px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 0.65rem;
            color: var(--text-secondary);
        }

        .streak-day.done {
            border-color: var(--accent);
            background: rgba(77, 208, 187, 0.15);
            color: #d8fff7;
            font-weight: 700;
        }

        @media (max-width: 980px) {
            .hero-card {
                grid-template-columns: 1fr;
            }

            .hero-img {
                order: -1;
                min-height: 230px;
                max-height: 300px;
            }
        }

        @media (max-width: 760px) {
            .header {
                height: auto;
                gap: 0.7rem;
                flex-direction: column;
                align-items: stretch;
                padding: 0.8rem 1rem;
            }

            .nav-actions {
                justify-content: space-between;
            }

            main {
                padding: 132px 0.9rem 120px;
            }

            .hero-card {
                min-height: auto;
                padding: 0.95rem;
                border-radius: 16px;
            }

            .hero-desc {
                -webkit-line-clamp: 3;
            }
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="brand" onclick="location.reload()">WildShorts</div>
        <div class="nav-actions">
            <div class="user-panel" id="ws-card-display" onclick="showCardSelector()">
                <i class="fa-solid fa-credit-card"></i>
                <span id="ws-card-name-label">Seleccionar Tarjeta</span>
            </div>
            <div class="user-panel">
                <div class="balance">
                    <img src="" class="ws-gem-icon wildgems-static-icon" style="width:20px;">
                    <span id="ws-balance">0</span>
                </div>
            </div>
        </div>
    </header>

    <nav class="dock">
        <button id="ws-store-btn" class="dock-btn active">
            <i class="fa-solid fa-house"></i>
            <span>Inicio</span>
        </button>
        <button id="ws-gems-btn" class="dock-btn">
            <i class="fa-solid fa-gem"></i>
            <span>Gemas</span>
        </button>
        <button id="ws-swap-btn" class="dock-btn">
            <i class="fa-solid fa-shuffle"></i>
            <span>Canje</span>
        </button>
        <button id="ws-premium-btn" class="dock-btn">
            <i class="fa-solid fa-crown"></i>
            <span>VIP</span>
        </button>
    </nav>

    <main>
        <section class="hero" id="ws-hero"></section>
        <section id="ws-reward-hub"></section>

        <h2 class="section-title">Nuevas Historias</h2>
        <section class="grid" id="ws-books"></section>
    </main>

    <div id="ws-modal" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
            <div id="ws-modal-body"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://owsdatabase.onrender.com';
        let oceanPayToken = localStorage.getItem('opToken');
        let oceanPayUser = JSON.parse(localStorage.getItem('opUser') || 'null');
        let userBalance = 0;
        let userCards = [];
        let selected_card_id = localStorage.getItem('ws_selected_card_id');
        let premiumPlan = 'free';
        let purchasedEpisodes = JSON.parse(localStorage.getItem('ws_purchased_episodes') || '{}');
        let WILDGEMS_ICON_URL = '';
        let currentUtterance = null;
        let currentAudio = null;
        let selectedQuality = 'standard';
        const WS_EPISODE_PRICE = 50;
        const WS_REWARD_KEY = 'ws_reward_state_v2';

        function generateWildGemsIcon() {
            const canvas = document.createElement('canvas');
            const size = 64;
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            const x = size / 2, y = size / 2, s = size * 0.4;

            ctx.save(); ctx.translate(x, y);
            ctx.shadowBlur = s * 0.5; ctx.shadowColor = "rgba(168, 85, 247, 0.6)";
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const angle = (i * Math.PI * 2) / 6 - Math.PI / 2;
                const px = Math.cos(angle) * s * 0.5; const py = Math.sin(angle) * s * 0.5;
                if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
            }
            ctx.closePath();
            const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, s * 0.6);
            grad.addColorStop(0, "#d8b4fe"); grad.addColorStop(1, "#a855f7");
            ctx.fillStyle = grad; ctx.fill();
            ctx.strokeStyle = "rgba(255,255,255,0.4)"; ctx.lineWidth = 1;
            for (let i = 0; i < 6; i++) {
                const angle = (i * Math.PI * 2) / 6 - Math.PI / 2;
                ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(Math.cos(angle) * s * 0.5, Math.sin(angle) * s * 0.5); ctx.stroke();
            }
            ctx.restore();
            return canvas.toDataURL();
        }

        function wsTodayKey() {
            const now = new Date();
            const y = now.getFullYear();
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const d = String(now.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function wsDiffDays(a, b) {
            const da = new Date(`${a}T00:00:00`);
            const db = new Date(`${b}T00:00:00`);
            return Math.round((db - da) / 86400000);
        }

        function getWsRewardState() {
            let state = null;
            try { state = JSON.parse(localStorage.getItem(WS_REWARD_KEY) || 'null'); } catch (e) { state = null; }
            if (!state || typeof state !== 'object') {
                state = {
                    daily: { lastClaimDate: null, streak: 0 },
                    reading: { date: wsTodayKey(), confirmedEpisodes: {}, claimedMilestones: [] }
                };
            }
            if (!state.daily) state.daily = { lastClaimDate: null, streak: 0 };
            if (!state.reading) state.reading = { date: wsTodayKey(), confirmedEpisodes: {}, claimedMilestones: [] };
            if (state.reading.date !== wsTodayKey()) {
                state.reading = { date: wsTodayKey(), confirmedEpisodes: {}, claimedMilestones: [] };
            }
            return state;
        }

        function saveWsRewardState(state) {
            localStorage.setItem(WS_REWARD_KEY, JSON.stringify(state));
        }

        function getWsDailyRewardAmount(streak) {
            return Math.min(150, 50 + Math.max(0, streak - 1) * 20);
        }

Primera capa: rastreo aéreo y señalización de caída (Lira y su escuadrón).
Segunda capa: bloque de protección frontal para crías y huevos (Rhauk y dos anquilosaurios de choque).
Tercera capa: retaguardia de interrupción para fragmentos y depredadores oportunistas (Orvax, Nyra y cazadores mixtos).
Cuarta capa: equipo de rescate térmico, encargado de extraer heridos de zonas de fuego rápido.

A la primera hora, la columna se movió.
Miles de pasos de especies que hasta ayer no compartían agua.

El sonido era inmenso: placas óseas raspando roca, alas cortando ceniza, crías llorando, líderes dando órdenes en dialectos distintos.
Y por encima de todo, el crujido largo del cielo rompiéndose otra vez.

El primer incidente serio llegó en la Garganta del Vaho.
Un fragmento oblicuo cayó detrás de la columna y levantó una ola de calor que derribó a siete juveniles. Uno quedó atrapado bajo una raíz incendiada.

Nyra saltó sin esperar permiso.

Rhauk: ¡No entres!
Nyra: ¡Si no entro, no sale!

Entró.
El calor le quemó el costado.
Cortó lianas con garras y dientes, empujó al juvenil con la cabeza y lo dejó en manos de Tark, que selló las heridas superficiales con barro mineral.

No hubo aplauso.
Hubo continuidad.
Eso era mejor.

Más adelante, en el Paso de Colmillo Hueco, apareció el segundo problema: una manada de carnívoros menores del norte bloqueó la ruta pidiendo prioridad de paso. No querían pelear; querían sobrevivir primero.
Orvax, que en otro tiempo habría respondido con violencia, dio un paso al frente y cambió la ecuación.

Orvax: Si pelean por el orden, no queda orden.
Orvax: Se abren dos carriles.
Orvax: Crías al centro, manadas por flancos.
Orvax: El que rompa eso, responde conmigo.

La amenaza funcionó porque venía acompañada de una propuesta.
Se abrieron carriles.
La marcha siguió.

A media ruta, el cielo mostró su peor cara: una cadena de impactos en patrón escalonado, diseñada por azar cósmico para golpear cada sección de la columna con segundos de diferencia.
Era el escenario que Nyra había temido.

Lira gritó desde altura:

Lira: ¡Secuencia triple!
Lira: ¡Frente, centro, retaguardia!
Lira: ¡No se detengan!

Rhauk clavó cuernos en un bloque desprendido y lo desvió fuera del carril central.
Tark absorbió un fragmento menor con el lomo blindado y quedó aturdido, pero de pie.
Orvax saltó sobre una cornisa para derrumbarla justo a tiempo y crear un talud que amortiguó la caída del tercer impacto.
Nyra coordinó por voz hasta quedarse afónica.

Cuando el polvo bajó, la columna estaba fragmentada en tres grupos.
Vivos.
Separados.

El tramo final se volvió una operación de reunificación bajo fuego.
Los equipos de rescate trabajaron con ritmo imposible: cargar, correr, enfriar, volver.
Los más pequeños caminaban entre gigantes, cubiertos por sombras que antes les habrían dado miedo.

Al llegar a la Cuenca de Niebla Fría, nadie celebró de inmediato.
Primero contaron.
Luego contaron otra vez.

Había bajas.
Había ausencias.
Pero la mayoría estaba dentro del perímetro seguro.
Y el Nido de Niebla, aunque golpeado, seguía en pie.

Esa noche, alrededor de una fogata de piedra húmeda, Nyra se sentó junto a Rhauk y Orvax sin discutir territorio.

Nyra: Pensé que no iban a escucharme.
Rhauk: Pensé que no ibas a volver de la garganta.
Orvax: Pensé que hoy me tocaba caer.
Tark: Pensamos demasiado.
Tark: Marchamos mejor.

La frase quedó flotando como resumen del día.

Pero el episodio no cierra en calma.
Un vigía pterosaurio aterriza en emergencia con un fragmento extraño incrustado en el ala: no es roca común, es material oscuro, denso, que emite pulsos regulares.
No parece meteorito.
Parece señal.

Lira mira el fragmento, luego el cielo, y dicta lo que nadie quería oír:

Lira: Esto no es solo una tormenta.
Lira: Alguien está empujando la lluvia.

Último plano:
la Cuenca llena de supervivientes, la barrera reforzándose, y sobre todos ellos, una grieta luminosa con forma de arco.
No era el final del desastre.
Era el prólogo de una guerra más grande que el propio cielo.`
                                        }
                                    }

            try {

                if (!res.ok) throw new Error("Auth failed");
                const data = await res.json();
                if (data.token) oceanPayToken = data.token;
                oceanPayUser = data.id ? data : oceanPayUser;
                premiumPlan = 'free';

                // Verificamos suscripciones

        async function processLogin() {
            const user = document.getElementById('ws-user').value;
            const pass = document.getElementById('ws-pass').value;
            const errorEl = document.getElementById('ws-login-error');
            const loginBtn = document.getElementById('ws-login-btn');
            errorEl.style.display = 'none';
            if (!user || !pass) { errorEl.textContent = "Campos requeridos"; errorEl.style.display = 'block'; return; }
            if (loginBtn) { loginBtn.disabled = true; loginBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Conectando...'; }
            try {
                const res = await fetch(`${API_URL}/ocean-pay/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                const data = await res.json();
                if (res.ok) {
                    oceanPayToken = data.token;
                    localStorage.setItem('opToken', oceanPayToken);
                    localStorage.setItem('opUser', JSON.stringify(data.user));
                    closeModal();
                    await checkAuthAndCards();
                } else { errorEl.textContent = data.error || "Credenciales incorrectas"; errorEl.style.display = 'block'; }
            } catch (err) { errorEl.textContent = "Error de servidor"; errorEl.style.display = 'block'; }
            finally {
                if (loginBtn) { loginBtn.disabled = false; loginBtn.textContent = 'Conectar ahora'; }
            }
        }

        function countWords(text) {
            return String(text || '').trim().split(/\s+/).filter(Boolean).length;
        }

        function escapeHtml(text) {
            return String(text || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function nl2br(text) {
            return String(text || '').replace(/\n/g, '<br>');
        }

        function renderStoryRichText(rawText) {
            const source = String(rawText || '');
            const flashbackRegex = /\[FLASHBACK\|([^\]]+)\]([\s\S]*?)\[\/FLASHBACK\]/g;
            let html = '';
            let lastIndex = 0;
            let match;

            while ((match = flashbackRegex.exec(source)) !== null) {
                const plainChunk = source.slice(lastIndex, match.index);
                if (plainChunk) html += nl2br(escapeHtml(plainChunk));

                const flashTitle = escapeHtml((match[1] || 'Flashback').trim());
                const flashBody = nl2br(escapeHtml((match[2] || '').trim()));
                html += `
                    <details class="ws-flashback">
                        <summary>${flashTitle}</summary>
                        <div class="ws-flashback-body">${flashBody}</div>
                    </details>
                `;

                lastIndex = match.index + match[0].length;
            }

            const remaining = source.slice(lastIndex);
            if (remaining) html += nl2br(escapeHtml(remaining));

            return html;
        }

        function buildLongEpisodeText(baseText, episodeTitle, seriesTitle) {
            const base = String(baseText || '').trim();
            if (!base) return base;
            if (!/codigo\s*umbral/i.test(String(seriesTitle || ''))) return base;
            if (countWords(base) >= 1100) return base;

            const modules = [
                `La historia profundiza en el impacto emocional de ${episodeTitle}. Cada decisión tiene peso, y la tensión no proviene solo del conflicto externo, sino de lo que cada personaje está dispuesto a sacrificar para sostener su postura.`,
                `A medida que avanza la escena, el entorno se vuelve parte activa del relato: sonidos, distancias, silencios y ritmos marcan la percepción del peligro. En ${seriesTitle}, esos detalles cambian la lectura de cada momento.`,
                `También se abre una capa moral: lo correcto no siempre coincide con lo conveniente. Los protagonistas negocian entre deber, miedo y lealtad, y esa fricción explica por qué la narrativa mantiene un tono intenso y humano.`,
                `El episodio añade perspectiva estratégica. Lo que parecía una reacción impulsiva revela cálculo; lo que parecía control absoluto muestra fisuras. Ese desplazamiento de poder sostiene el interés sin romper la coherencia del mundo.`,
                `En paralelo, la presión psicológica sube: cansancio, culpa anticipada y dudas sobre la propia identidad. La historia se toma tiempo para mostrar cómo ese desgaste modifica la forma de hablar, actuar y confiar.`,
                `Este tramo no busca cerrar rápido, sino construir consecuencias. Cada giro deja una marca para los eventos siguientes, permitiendo que el arco avance con continuidad y no como escenas aisladas.`,
                `Por eso, ${episodeTitle} funciona como expansión narrativa: amplía motivaciones, refuerza reglas del universo y establece nuevos riesgos que todavía no han explotado por completo.`,
                `Cuando el capítulo termina, no hay alivio total: queda un equilibrio inestable que empuja a los personajes hacia decisiones mayores. Ese cierre mantiene la tensión y prepara el próximo episodio.`
            ];

            const expanded = [base];
            let index = 0;
            while (countWords(expanded.join(' ')) < 1200) {
                expanded.push(modules[index % modules.length]);
                index += 1;
            }

            return expanded.join('\n\n');
        }

                        <div style="border:1px solid var(--glass-border); border-radius:10px; padding:0.6rem; background:rgba(255,255,255,0.03);">
                            <div style="font-size:0.65rem; color:var(--text-secondary);">Total</div>
                            <div style="font-weight:800; color:var(--accent);">${totalCost} WG</div>
                        </div>
                        <div style="border:1px solid var(--glass-border); border-radius:10px; padding:0.6rem; background:rgba(255,255,255,0.03);">
                            <div style="font-size:0.65rem; color:var(--text-secondary);">Saldo actual</div>
                            <div style="font-weight:800; color:${userBalance >= totalCost ? 'var(--ok)' : 'var(--danger)'};">${userBalance} WG</div>
                        </div>
                    </div>
                    <div style="display:flex; gap:0.65rem; justify-content:flex-end; flex-wrap:wrap;">
                        <button class="btn" style="padding:0.7rem 1rem; border-radius:12px; background:rgba(255,255,255,0.06);" onclick="closeModal()">
                            Cancelar
                        </button>
                        <button class="btn btn-primary" style="padding:0.7rem 1.1rem; border-radius:12px;" onclick="window.confirmBulkBuyAllEpisodes('${book.id}')">
                            Comprar todo (${totalCost} WG)
                        </button>
                    </div>
                </div>
            `;
            showModal(checkoutHtml);
            window.__wsBulkEpisodeCheckout = {
                bookId: book.id,
                episodeIds: lockedEpisodes.map(e => e.id),
                totalCost,
                triggerButton: triggerButton || null
            };
        }

        window.confirmBulkBuyAllEpisodes = async function (bookId) {
            const ctx = window.__wsBulkEpisodeCheckout || null;
            if (!ctx || ctx.bookId !== bookId) return;
            const book = getBookById(ctx.bookId);
            if (!book) return;
            const lockedEpisodes = book.seasons
                .flatMap(s => s.episodes)
                .filter(e => ctx.episodeIds.includes(e.id) && !purchasedEpisodes[e.id]);
            if (!lockedEpisodes.length) {
                closeModal();
                alert('Ya tienes todos los episodios desbloqueados.');
                return;
            }
            if (!selected_card_id) { closeModal(); showCardSelector(true); return; }

            const card = userCards.find(c => c.id == selected_card_id);
            if (!card?.card_number) { alert('Tarjeta no válida.'); return; }

            const triggerButton = ctx.triggerButton;
            const originalText = triggerButton ? triggerButton.innerHTML : '';
            if (triggerButton) {
                triggerButton.dataset.loading = '1';
                triggerButton.disabled = true;
                triggerButton.classList.add('is-loading');
                triggerButton.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> PROCESANDO...';
            }
            closeModal();

            let success = false;
            try {
                const res = await fetch(`${API_URL}/ocean-pay/cards/change-balance`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${oceanPayToken}` },
                    body: JSON.stringify({
                        cardNumber: card.card_number,
                        currencyType: 'wildgems',
                        amount: -ctx.totalCost,
                        concepto: `WildShorts pack completo: ${book.id} (${lockedEpisodes.length} episodios)`
                    })
                });

                if (!res.ok) {
                    const data = await res.json().catch(() => ({}));
                    if (data.error?.includes('token') || data.error?.includes('jwt')) {
                        localStorage.removeItem('opToken');
                        oceanPayToken = null;
                        alert('Sesión expirada o inválida. Inicia sesión nuevamente.');
                        showLoginForm();
                        return;
                    }
                    throw new Error(data.error || 'Error al procesar el pago');
                }

                for (const ep of lockedEpisodes) purchasedEpisodes[ep.id] = true;
                localStorage.setItem('ws_purchased_episodes', JSON.stringify(purchasedEpisodes));
                await checkAuthAndCards();
                success = true;
                alert(`¡Listo! Se desbloquearon ${lockedEpisodes.length} episodios.`);
                window.openBookStore(book.id);
            } catch (err) {
                alert(err.message || 'Error de conexión');
            } finally {
                if (triggerButton) {
                    triggerButton.dataset.loading = '0';
                    triggerButton.disabled = false;
                    triggerButton.classList.remove('is-loading');
                    triggerButton.innerHTML = success ? '<i class="fa-solid fa-check"></i> COMPLETADO' : originalText;
                }
                window.__wsBulkEpisodeCheckout = null;
            }
        };

        window.showArticle = (id) => {
            let episode = null;
            let seriesTitle = 'WildShorts';
            booksByCategory.forEach(c => c.books.forEach(b => b.seasons.forEach(s => s.episodes.forEach(e => { if (e.id === id) episode = e; }))));
            booksByCategory.forEach(c => c.books.forEach(b => b.seasons.forEach(s => s.episodes.forEach(e => { if (e.id === id) seriesTitle = b.title; }))));

            const isVip = premiumPlan === 'Premium VIP';
            const readableText = buildLongEpisodeText(episode?.content?.ES || '', episode?.title || 'Episodio', seriesTitle);

            showModal(`
                <article style="padding:1rem; position:relative;">
                    <h2 class="story-title" style="margin-bottom: 1.5rem;">${episode.title}</h2>
                    <div class="story-content" style="font-size: 1.05rem; line-height: 1.8; color: #e2e8f0;">${renderStoryRichText(readableText)}</div>
                    <div style="margin-top:1.4rem; border:1px solid var(--border); border-radius:16px; padding:1rem; background:rgba(13,18,16,0.65);">
                        <div style="font-weight:800; margin-bottom:0.35rem;">Confirmación estricta de lectura</div>
                        <div style="font-size:0.82rem; color:var(--text-secondary); margin-bottom:0.55rem;">Escribe <strong>CONFIRMAR</strong> para validar este episodio y sumar progreso de recompensa.</div>
                        <div style="display:flex; gap:0.5rem; flex-wrap:wrap;">
                            <input id="ws-read-confirm-input-${id}" placeholder="CONFIRMAR" style="flex:1; min-width:190px; border-radius:10px; border:1px solid var(--border); background:#0f1614; color:#fff; padding:0.62rem 0.72rem;">
                            <button class="btn btn-primary" id="ws-read-confirm-btn-${id}" onclick="confirmEpisodeRead('${id}', this)">Validar Lectura</button>
                        </div>
                    </div>
                </article>
            `);
        }


        async function buyEpisode(id, price, triggerButton) {
            if (triggerButton?.dataset?.loading === '1') return;
            if (!selected_card_id) { showCardSelector(true); return; }
            if (userBalance < price) { alert("Balance insuficiente"); return; }
            const card = userCards.find(c => c.id == selected_card_id);
            const originalText = triggerButton ? triggerButton.innerHTML : '';
            if (triggerButton) {
                triggerButton.dataset.loading = '1';
                triggerButton.disabled = true;
                triggerButton.classList.add('is-loading');
                triggerButton.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> PROCESANDO...';
            }
            let success = false;
            try {
                const res = await fetch(`${API_URL}/ocean-pay/cards/change-balance`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${oceanPayToken}` },
                    body: JSON.stringify({
                        cardNumber: card.card_number,
                        currencyType: 'wildgems',
                        amount: -price,
                        concepto: `WildShorts: ${id}`
                    })
                });
                if (res.ok) {
                    success = true;
                    purchasedEpisodes[id] = true;
                    localStorage.setItem('ws_purchased_episodes', JSON.stringify(purchasedEpisodes));
                    await checkAuthAndCards();
                    if (triggerButton) {
                        triggerButton.innerHTML = '<i class="fa-solid fa-check"></i> DESBLOQUEADO';
                    }
                    alert("¡Episodio desbloqueado!");
                    checkAuthAndCards(); // Refresh VIP status
                    closeModal();
                } else {
                    const data = await res.json();
                    if (data.error?.includes('token') || data.error?.includes('jwt')) {
                        localStorage.removeItem('opToken');
                        oceanPayToken = null;
                        alert("Sesión expirada o inválida. Por favor, inicia sesión de nuevo.");
                        showLoginForm();
                    } else {
                        alert(data.error || "Error al procesar el pago");
                    }
                }
            } catch (err) {
                alert("Error de conexión");
            } finally {
                if (triggerButton && !success) {
                    triggerButton.dataset.loading = '0';
                    triggerButton.disabled = false;
                    triggerButton.classList.remove('is-loading');
                    triggerButton.innerHTML = originalText;
                }
            }
        }

        window.showSubscriptionUI = () => {
            let html = `
                <div style="text-align:center; padding:1rem;">
                    <div style="font-size:4rem; margin-bottom:1.5rem;">ðŸ‘‘</div>
                    <h2 class="story-title">Premium VIP</h2>
                    <p style="color:var(--text-secondary); margin-bottom:2rem;">Acceso ilimitado a todos los episodios premium, insignias exclusivas y soporte prioritario.</p>
                    
                    <div style="background:var(--surface); padding:2rem; border-radius:32px; border:1px solid var(--accent); margin-bottom:2rem; text-align:left;">
                        <h3 style="color:#fff; margin-bottom:1rem;">Beneficios VIP:</h3>
                        <ul style="color:var(--text-secondary); list-style:none; padding:0; display:grid; gap:12px;">
                            <li><i class="fa-solid fa-percent" style="color:var(--accent); width:20px;"></i> 40% de descuento en la compra de episodios</li>
                            <li><i class="fa-solid fa-bolt" style="color:var(--accent); width:20px;"></i> Acceso prioritario a nuevos lanzamientos</li>
                            <li><i class="fa-solid fa-crown" style="color:var(--accent); width:20px;"></i> Insignia exclusiva y perfil destacado</li>
                            <li><i class="fa-solid fa-gem" style="color:var(--accent); width:20px;"></i> Multiplicador de recompensas diarias</li>
                        </ul>
                    </div>

                    <div style="background:var(--bg); padding:1.5rem; border-radius:24px; border:1px solid var(--border); margin-bottom:2rem;">
                        <span style="font-size:0.8rem; color:var(--text-secondary); text-transform:uppercase;">Precio de Suscripción</span>
                        <div style="font-size:2rem; font-weight:900; color:#fff;">500 <span style="font-size:1rem; color:var(--accent);">WildGems</span></div>
                        <span style="font-size:0.8rem; color:var(--text-secondary);">Válido por 7 días</span>
                    </div>

                    <button id="ws-btn-subscribe" class="btn btn-primary" style="width:100%; padding:1.2rem;" onclick="subscribePremium()">
                        ${premiumPlan === 'Premium VIP' ? 'RENOVAR SUSCRIPCI"N' : 'SUSCRIBIRSE AHORA'}
                    </button>
                </div>
            `;
            showModal(html);
        };

        async function subscribePremium() {
            if (!selected_card_id) { showCardSelector(true); return; }
            const btn = document.getElementById('ws-btn-subscribe');
            const originalText = btn.textContent;
            btn.textContent = 'Procesando...';
            btn.disabled = true;

            try {
                const res = await fetch(`${API_URL}/ocean-pay/subscriptions/subscribe`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${oceanPayToken}` },
                    body: JSON.stringify({
                        cardId: selected_card_id,
                        plan: 'Premium VIP',
                        projectId: 'WildShorts',
                        subName: 'WildShorts Premium',
                        durationDays: 7,
                        price: 500
                    })
                });

                const data = await res.json();
                if (data.success) {
                    alert('¡Suscripción exitosa!');
                    await checkAuthAndCards();
                    closeModal();
                } else {
                    if (data.error?.includes('token') || data.error?.includes('jwt')) {
                        localStorage.removeItem('opToken');
                        oceanPayToken = null;
                        alert("Sesión expirada o inválida. Por favor, inicia sesión de nuevo.");
                        showLoginForm();
                    } else {
                        alert('Error: ' + data.error);
                    }
                }
            } catch (err) {
                alert('Error de conexión');
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        }

        function updateUI() {
            document.getElementById('ws-balance').textContent = userBalance;
            const c = userCards.find(x => x.id == selected_card_id);
            document.getElementById('ws-card-name-label').textContent = c ? c.card_name : "Seleccionar Tarjeta";
            renderWsRewardHub();
        }

        async function confirmEpisodeRead(episodeId, triggerButton) {
            const input = document.getElementById(`ws-read-confirm-input-${episodeId}`);
            const typed = String(input?.value || '').trim().toUpperCase();
            if (typed !== 'CONFIRMAR') {
                alert('Escribe exactamente CONFIRMAR para validar.');
                return;
            }

            const state = getWsRewardState();
            if (state.reading.confirmedEpisodes[episodeId]) {
                alert('Este episodio ya fue confirmado hoy.');
                return;
            }

            const originalText = triggerButton ? triggerButton.innerHTML : '';
            if (triggerButton) {
                triggerButton.disabled = true;
                triggerButton.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> VALIDANDO...';
            }

            state.reading.confirmedEpisodes[episodeId] = true;
            const confirmedCount = Object.keys(state.reading.confirmedEpisodes).length;
            const milestone = getWsReadingRewardAmount(confirmedCount, state.reading.claimedMilestones || []);

            if (!milestone) {
                saveWsRewardState(state);
                renderWsRewardHub();
                if (triggerButton) triggerButton.innerHTML = '<i class="fa-solid fa-check"></i> VALIDADO';
                alert('Lectura confirmada. Sigue leyendo para alcanzar hitos diarios.');
                return;
            }

            const rewardOk = await awardWildGems(milestone.amount, `WildShorts hito de lectura (${milestone.count} episodios)`);
            if (rewardOk) {
                state.reading.claimedMilestones.push(milestone.count);
                saveWsRewardState(state);
                renderWsRewardHub();
                if (triggerButton) triggerButton.innerHTML = '<i class="fa-solid fa-check"></i> VALIDADO';
                alert(`Hito completado: +${milestone.amount} WildGems por ${milestone.count} episodios.`);
            } else if (triggerButton) {
                triggerButton.disabled = false;
                triggerButton.innerHTML = originalText;
            }
        }

        // --- Event Listeners and Init ---
        document.getElementById('ws-store-btn').onclick = () => { renderBooks(); window.scrollTo({ top: 0, behavior: 'smooth' }); };
        document.getElementById('ws-gems-btn').onclick = () => {
            showModal(`
                <div style="text-align:center; padding:2rem;">
                    <i class="fa-solid fa-gem" style="font-size:3rem; color: #fbbf24; margin-bottom:2rem;"></i>
                    <h2 class="story-title">Centro de WildGems</h2>
                    <p style="color:var(--text-secondary); margin-bottom:2.5rem;">Ahora las WildGems se obtienen por recompensa diaria y lectura confirmada.</p>
                    <button class="btn btn-primary" onclick="closeModal(); window.scrollTo({ top: 0, behavior: 'smooth' });">Ver Panel</button>
                </div>
             `);
        };

        window.showSwapUI = () => {
            showModal(`
                <div style="text-align:center; padding:2rem;">
                    <i class="fa-solid fa-ban" style="font-size:2.5rem; color:#f87171; margin-bottom:1rem;"></i>
                    <h2 class="story-title">Intercambio desactivado</h2>
                    <p style="color:var(--text-secondary);">WildShorts ya no permite canje de divisas. Usa recompensas diarias y lectura confirmada.</p>
                </div>
            `);
        };
        async function createSwapRequest() {
            showSwapUI();
        }

        document.getElementById('ws-swap-btn').onclick = () => window.showSwapUI();
        document.getElementById('ws-premium-btn').onclick = () => window.showSubscriptionUI();
        let wsInitialized = false;
        async function initializeWildShorts() {
            if (wsInitialized) return;
            wsInitialized = true;

            WILDGEMS_ICON_URL = generateWildGemsIcon();
            document.querySelectorAll('.wildgems-static-icon').forEach(img => img.src = WILDGEMS_ICON_URL);
            try { renderBooks(); } catch (e) { console.error('renderBooks error:', e); }
            try { renderHero(); } catch (e) { console.error('renderHero error:', e); }
            try { renderWsRewardHub(); } catch (e) { console.error('renderWsRewardHub error:', e); }
            await checkAuthAndCards();

            if (window.gsap) {
                gsap.from(".header", { duration: 1.2, y: -100, opacity: 0, ease: "expo.out" });
                gsap.from(".dock", { duration: 1.2, y: 100, opacity: 0, ease: "expo.out", delay: 0.5 });
                gsap.from(".card", { duration: 0.8, scale: 0.9, opacity: 0, stagger: 0.1, ease: "power2.out", delay: 0.8 });
            }
        }

        document.addEventListener('DOMContentLoaded', initializeWildShorts);
        if (document.readyState !== 'loading') {
            initializeWildShorts();
        }
    </script>
</body>
